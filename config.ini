# SAM3 模型配置文件
# 修改此文件即可调整模型参数，无需修改代码

# =============================================================================
# 模型设置
# =============================================================================

[model]
# 模型类型：default (ViT-B), large (ViT-L), huge (ViT-H)
# default - 358MB, 速度快，适合一般用途
# large   - 1.2GB, 精度更高，适合复杂场景
# huge    - 2.5GB, 最高精度，适合专业用途
type = "default"

# 运行设备：auto, cuda, cpu
# auto   - 自动选择（优先 GPU）
# cuda   - 强制使用 GPU
# cpu    - 强制使用 CPU
device = "auto"

# 模型文件路径（留空则使用默认路径）
# 格式：模型类型：路径
# 示例：default = ./models/sam_vit_b_01ec64.pth
model_paths = {}

# =============================================================================
# 分割参数
# =============================================================================

[segmentation]
# 默认置信度阈值 (0.0 - 1.0)
# 越高越严格，越低越宽松
default_confidence_threshold = 0.5

# 最小掩码面积比例 (0.0 - 1.0)
# 小于此比例的掩码会被过滤掉
min_mask_area_ratio = 0.01

# 最大掩码数量
# 限制返回的掩码数量，避免过多结果
max_masks = 10

# 是否启用多掩码输出
# 启用后会尝试生成多个可能的分割结果
multimask_output = false

# =============================================================================
# 输出设置
# =============================================================================

[output]
# 默认背景颜色：transparent, black, white, 或 RGB 值
# RGB 格式："R,G,B" 如 "0,0,0" 表示黑色
default_background_color = "transparent"

# 默认输出格式：png, jpg, webp
default_output_format = "png"

# PNG 压缩级别 (0-9)
# 0=无压缩，9=最大压缩
png_compression_level = 6

# JPEG 质量 (1-100)
jpeg_quality = 95

# 是否保存掩码图
save_mask = true

# 掩码图后缀
mask_suffix = "_mask"

# =============================================================================
# 批处理设置
# =============================================================================

[batch]
# 批处理大小
# 同时处理的图像数量，受内存限制
batch_size = 4

# 是否跳过失败的文件
skip_on_error = true

# 错误日志文件
error_log = "batch_errors.log"

# =============================================================================
# 高级设置
# =============================================================================

[advanced]
# 是否启用缓存
# 缓存已处理的图像，加速重复处理
enable_cache = false

# 缓存目录
cache_dir = "./cache"

# 是否输出详细日志
verbose = false

# 随机种子（用于可重复性）
# 留空表示不设置
random_seed = ""

# 是否使用点提示自动优化
auto_point_optimization = false

# 是否使用框提示自动优化
auto_box_optimization = false
